<!DOCTYPE html>
<html>
<head>
<title>MiniChat</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#1f1f1f;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:230px;
background:#2b2b2b;
padding:15px;
box-sizing:border-box;
border-right:1px solid #444;
}

#sidebar input{
width:100%;
margin-bottom:8px;
}

#inviteBox input{
width:100%;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
display:flex;
margin:8px 0;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
margin-right:10px;
}

.name{
font-weight:bold;
}

.time{
font-size:11px;
opacity:.6;
margin-left:6px;
}

.badge{
background:#444;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:4px;
}

#inputbar{
display:flex;
padding:10px;
background:#2b2b2b;
}

#inputbar input{
flex:1;
margin-right:6px;
}

#users{
width:170px;
background:#2b2b2b;
padding:10px;
border-left:1px solid #444;
overflow:auto;
}

.user{
display:flex;
align-items:center;
margin:6px 0;
}

.user img{
width:20px;
height:20px;
border-radius:50%;
margin-right:6px;
}

.system{
opacity:.6;
font-style:italic;
margin:6px 0;
}

#typing{
font-size:12px;
opacity:.6;
padding-left:15px;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Room</h3>

<input id="room" placeholder="Room name">

<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>

<div id="inviteBox"></div>

<h3>Profile</h3>

<input id="username" placeholder="Name">
<input type="color" id="color">
<input id="badge" placeholder="Badge">
<input type="file" id="avatar">

</div>

<div id="main">

<div id="chat"></div>

<div id="typing"></div>

<div id="inputbar">

<input id="message" placeholder="Message">

<input type="file" id="image">

<button onclick="send()">Send</button>

</div>

</div>

<div id="users">

<h3>Online</h3>
<div id="userList"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

let peer
let connections=[]
let users={}

const chat=document.getElementById("chat")

function saveHistory(){
localStorage.setItem("chatHistory",chat.innerHTML)
}

function loadHistory(){
let h=localStorage.getItem("chatHistory")
if(h) chat.innerHTML=h
}

function createRoom(){

let roomName=room.value||Math.random().toString(36).substring(2,8)

room.value=roomName

peer=new Peer(roomName)

peer.on("connection",conn=>{
setup(conn)
})

system("Room created")

loadHistory()

let link=location.origin+location.pathname+"?room="+roomName

inviteBox.innerHTML=
`
Invite Link
<input id="inviteLink" value="${link}">
<button onclick="copyInvite()">Copy</button>
`

}

function copyInvite(){

let i=document.getElementById("inviteLink")

i.select()

document.execCommand("copy")

alert("Invite copied")

}

function joinRoom(){

peer=new Peer()

peer.on("open",()=>{

let conn=peer.connect(room.value)

setup(conn)

})

loadHistory()

}

function setup(conn){

connections.push(conn)

conn.on("data",receive)

conn.on("close",()=>{
system("User disconnected")
})

}

function broadcast(d){
connections.forEach(c=>c.send(d))
}

function send(){

let name=username.value||"User"

let colorVal=color.value

let badgeVal=badge.value

let msg=message.value

let img=image.files[0]

let avatarFile=avatar.files[0]

function finishSend(avatarData){

let data={
type:"msg",
name,
color:colorVal,
badge:badgeVal,
msg,
avatar:avatarData,
time:Date.now()
}

if(img){

let r=new FileReader()

r.onload=e=>{

data.img=e.target.result

broadcast(data)

addMessage(data)

}

r.readAsDataURL(img)

}else{

broadcast(data)

addMessage(data)

}

}

if(avatarFile){

let r=new FileReader()

r.onload=e=>finishSend(e.target.result)

r.readAsDataURL(avatarFile)

}else{

finishSend(null)

}

message.value=""
image.value=""

}

function receive(d){

if(d.type==="msg") addMessage(d)

if(d.type==="typing"){

typing.innerText=d.name+" is typing..."

setTimeout(()=>typing.innerText="",1200)

}

if(d.type==="namechange"){

system(d.old+" changed name to "+d.new)

}

}

function addMessage(d){

let div=document.createElement("div")

div.className="msg"

let time=new Date(d.time).toLocaleTimeString()

let avatarImg=d.avatar||"https://i.imgur.com/6VBx3io.png"

let msg=d.msg.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>')

div.innerHTML=

`
<img class="avatar" src="${avatarImg}">

<div>

<span class="name" style="color:${d.color}">
${d.name}
</span>

${d.badge?'<span class="badge">'+d.badge+'</span>':''}

<span class="time">${time}</span>

<div>${msg}</div>

${d.img?'<img src="'+d.img+'" width="220">':""}

</div>
`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

saveHistory()

}

function system(t){

let div=document.createElement("div")

div.className="system"

div.innerText=t

chat.appendChild(div)

saveHistory()

}

message.addEventListener("input",()=>{

broadcast({
type:"typing",
name:username.value||"User"
})

})

username.addEventListener("change",()=>{

broadcast({
type:"namechange",
old:"User",
new:username.value
})

})

chat.addEventListener("dragover",e=>e.preventDefault())

chat.addEventListener("drop",e=>{

e.preventDefault()

image.files=e.dataTransfer.files

})

message.addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

const params=new URLSearchParams(location.search)

if(params.get("room")){
room.value=params.get("room")
joinRoom()
}

</script>

</body>
</html>
