<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

let peer = null
let connections = {}
let isHost = false
let currentRoom = null

const chat = document.getElementById("chat")

function saveHistory(){
  localStorage.setItem("chatHistory_"+currentRoom, chat.innerHTML)
}

function loadHistory(){
  const h = localStorage.getItem("chatHistory_"+currentRoom)
  if(h) chat.innerHTML = h
}

function setRoomUI(created){
  document.querySelector("button[onclick='createRoom()']").disabled = created
  room.disabled = created
}

function createRoom(){

  const roomName = room.value.trim()

  if(!roomName){
    alert("Type a room code first.")
    return
  }

  if(peer){
    peer.destroy()
    connections = {}
  }

  currentRoom = roomName
  isHost = true

  peer = new Peer(roomName)

  peer.on("connection", conn=>{
    setupConnection(conn)
  })

  system("Room created")

  loadHistory()

  setRoomUI(true)

  inviteBox.innerHTML = `
    Invite Link
    <input id="inviteLink" value="${location.origin + location.pathname + "?room=" + roomName}">
    <button onclick="copyInvite()">Copy</button>
  `
}

function copyInvite(){
  const i = document.getElementById("inviteLink")
  i.select()
  document.execCommand("copy")
  alert("Copied!")
}

function joinRoom(){

  if(peer){
    peer.destroy()
    connections = {}
  }

  if(!room.value.trim()){
    alert("Enter room code.")
    return
  }

  currentRoom = room.value.trim()
  isHost = false

  peer = new Peer()

  peer.on("open", ()=>{
    const conn = peer.connect(currentRoom)

    conn.on("open", ()=>{
      setupConnection(conn)
      conn.send({type:"requestHistory"})
    })
  })

  loadHistory()

  setRoomUI(false)
}

function setupConnection(conn){

  if(connections[conn.peer]) return

  connections[conn.peer] = conn

  conn.on("data", receive)

  conn.on("close", ()=>{
    delete connections[conn.peer]
    system("User disconnected")
  })
}

function broadcast(data){
  Object.values(connections).forEach(c=>{
    if(c.open) c.send(data)
  })
}

function send(){

  const msg = message.value.trim()
  if(!msg) return

  const data = {
    type:"msg",
    name: username.value || "User",
    color: color.value,
    badge: badge.value,
    msg,
    time: Date.now()
  }

  broadcast(data)
  addMessage(data)

  message.value=""
}

function receive(data){

  if(data.type==="msg"){
    addMessage(data)
  }

  if(data.type==="typing"){
    typing.innerText = data.name+" is typing..."
    clearTimeout(window.typingTimer)
    window.typingTimer = setTimeout(()=>{
      typing.innerText=""
    },1000)
  }

  if(data.type==="requestHistory" && isHost){
    broadcast({
      type:"history",
      content: chat.innerHTML
    })
  }

  if(data.type==="history"){
    chat.innerHTML = data.content
  }
}

function addMessage(d){

  const div = document.createElement("div")
  div.className="msg"

  const time = new Date(d.time).toLocaleTimeString()

  div.innerHTML = `
    <div>
      <span class="name" style="color:${d.color}">
        ${d.name}
      </span>
      ${d.badge ? `<span class="badge">${d.badge}</span>`:""}
      <span class="time">${time}</span>
      <div>${d.msg}</div>
    </div>
  `

  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
  saveHistory()
}

function system(text){
  const div=document.createElement("div")
  div.className="system"
  div.innerText=text
  chat.appendChild(div)
  chat.scrollTop=chat.scrollHeight
  saveHistory()
}

let typingCooldown=false

message.addEventListener("input",()=>{

  if(typingCooldown) return
  typingCooldown=true

  broadcast({
    type:"typing",
    name: username.value || "User"
  })

  setTimeout(()=>typingCooldown=false,500)
})

message.addEventListener("keypress",e=>{
  if(e.key==="Enter") send()
})

const params = new URLSearchParams(location.search)

if(params.get("room")){
  room.value=params.get("room")
  joinRoom()
}

</script>
