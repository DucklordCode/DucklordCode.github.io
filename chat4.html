<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

let peer = null
let connections = {}
let isHost = false

const chat = document.getElementById("chat")

function saveHistory(){
  localStorage.setItem("chatHistory", chat.innerHTML)
}

function loadHistory(){
  let h = localStorage.getItem("chatHistory")
  if(h) chat.innerHTML = h
}

function createRoom(){

  if(peer) peer.destroy()

  const roomName = room.value || Math.random().toString(36).substring(2,8)
  room.value = roomName

  isHost = true
  connections = {}

  peer = new Peer(roomName)

  peer.on("connection", conn => {
    setupConnection(conn)
  })

  system("Room created")

  loadHistory()

  const link = location.origin + location.pathname + "?room=" + roomName

  inviteBox.innerHTML = `
    Invite Link
    <input id="inviteLink" value="${link}">
    <button onclick="copyInvite()">Copy</button>
  `
}

function joinRoom(){

  if(peer) peer.destroy()

  isHost = false
  connections = {}

  peer = new Peer()

  peer.on("open", id => {

    const conn = peer.connect(room.value)

    conn.on("open", () => {
      setupConnection(conn)
      conn.send({type:"requestHistory"})
    })

  })

  loadHistory()
}

function setupConnection(conn){

  if(connections[conn.peer]) return

  connections[conn.peer] = conn

  conn.on("data", receive)
  conn.on("close", () => {
    delete connections[conn.peer]
    system("User disconnected")
  })
}

function broadcast(data){
  Object.values(connections).forEach(c => {
    if(c.open) c.send(data)
  })
}

function send(){

  const name = username.value || "User"
  const colorVal = color.value
  const badgeVal = badge.value
  const msg = message.value
  if(!msg.trim()) return

  const imgFile = image.files[0]
  const avatarFile = avatar.files[0]

  function finalize(avatarData){

    const data = {
      type:"msg",
      name,
      color:colorVal,
      badge:badgeVal,
      msg,
      avatar:avatarData,
      time:Date.now()
    }

    if(imgFile){
      const r = new FileReader()
      r.onload = e => {
        data.img = e.target.result
        broadcast(data)
        addMessage(data)
      }
      r.readAsDataURL(imgFile)
    } else {
      broadcast(data)
      addMessage(data)
    }
  }

  if(avatarFile){
    const r = new FileReader()
    r.onload = e => finalize(e.target.result)
    r.readAsDataURL(avatarFile)
  } else {
    finalize(null)
  }

  message.value = ""
  image.value = ""
}

function receive(data){

  if(data.type === "msg"){
    addMessage(data)
  }

  if(data.type === "typing"){
    typing.innerText = data.name + " is typing..."
    clearTimeout(window.typingTimeout)
    window.typingTimeout = setTimeout(()=>typing.innerText="",1000)
  }

  if(data.type === "requestHistory" && isHost){
    const history = chat.innerHTML
    data.type = "history"
    broadcast({type:"history", content:history})
  }

  if(data.type === "history"){
    chat.innerHTML = data.content
  }
}

function addMessage(d){

  const div = document.createElement("div")
  div.className = "msg"

  const time = new Date(d.time).toLocaleTimeString()

  const avatarImg = d.avatar || "https://i.imgur.com/6VBx3io.png"

  const msg = d.msg.replace(/(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>')

  div.innerHTML = `
    <img class="avatar" src="${avatarImg}">
    <div>
      <span class="name" style="color:${d.color}">
        ${d.name}
      </span>
      ${d.badge ? `<span class="badge">${d.badge}</span>` : ""}
      <span class="time">${time}</span>
      <div>${msg}</div>
      ${d.img ? `<img src="${d.img}" width="220">` : ""}
    </div>
  `

  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
  saveHistory()
}

function system(text){

  const div = document.createElement("div")
  div.className = "system"
  div.innerText = text

  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
  saveHistory()
}

let typingCooldown = false

message.addEventListener("input", () => {

  if(typingCooldown) return
  typingCooldown = true

  broadcast({
    type:"typing",
    name:username.value || "User"
  })

  setTimeout(()=>typingCooldown=false,500)
})

message.addEventListener("keypress", e=>{
  if(e.key === "Enter") send()
})

const params = new URLSearchParams(location.search)

if(params.get("room")){
  room.value = params.get("room")
  joinRoom()
}

loadHistory()

</script>
