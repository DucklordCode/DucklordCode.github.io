```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhys Chat</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:#111827;
padding:15px;
border-right:1px solid #1f2937;
overflow:auto;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#1d4ed8}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

/* MESSAGE */

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.name{font-weight:bold}

.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

.system{
opacity:.7;
font-style:italic;
margin:6px 0;
}

/* INPUT */

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input[type="text"]{
flex:1;
padding:8px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

/* ADMIN PANEL */

#adminPanel{
display:none;
background:#1f2937;
padding:10px;
margin-top:10px;
border-radius:8px;
}

/* GOOBER CLICKER */

#gooberGame{

position:fixed;
bottom:20px;
right:20px;

width:120px;

background:#111827;
border:1px solid #1f2937;
border-radius:8px;

font-size:11px;
z-index:1000;

}

#gooberHeader{

background:#1f2937;
display:flex;
justify-content:space-between;
align-items:center;

padding:4px;
cursor:move;

}

#gooberHeader button{

background:none;
border:none;
color:white;
cursor:pointer;

}

#gooberBody{

padding:6px;
text-align:center;

}

#goober{

width:40px;
height:40px;

background:#374151;

border-radius:6px;

display:flex;
align-items:center;
justify-content:center;

font-size:18px;

margin:auto;
cursor:pointer;

transition:transform .1s;

}

#goober.pop{
transform:scale(1.2)
}

#gooberGame button{
width:100%;
font-size:10px;
margin-top:3px;
}

.rainbowGoober{
animation:hue 3s linear infinite
}

@keyframes hue{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

/* BRODY ERROR */

#brodyScreen{
position:fixed;
inset:0;
background:#0078d7;
color:white;
font-family:"Lucida Console","Courier New",monospace;
padding:30px;
display:none;
z-index:9999;
overflow:hidden;
}

</style>
</head>

<body>

<div id="brodyScreen"></div>

<div id="sidebar">

<h2>Bhys Chat</h2>

<h3>Room</h3>
<input id="room" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<h3>Profile</h3>
<input id="username" placeholder="Name">
<input type="color" id="color" value="#60a5fa">
<input id="badge" placeholder="Badge">
<input type="file" id="avatarUpload">

<button onclick="applyGooberBadge()">Use Goober Badge</button>

<div id="adminPanel">

<h3>Dev Panel</h3>

<button onclick="clearChat()">Clear Chat</button>
<button onclick="spamSystem()">Spam Event</button>

<h4>Goober Hacks</h4>

<button onclick="hackGoobers(1000)">+1,000 Goobers</button>
<button onclick="hackGoobers(10000)">+10,000 Goobers</button>
<button onclick="maxGoober()">Max Upgrades</button>
<button onclick="forceRebirth()">Instant Rebirth</button>
<button onclick="resetGoober()">Reset Goobers</button>

</div>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputbar">
<input id="message" type="text" placeholder="Message...">
<input type="file" id="image">
<button onclick="send()">Send</button>
</div>

</div>

<!-- GOOBER GAME -->

<div id="gooberGame">

<div id="gooberHeader">
<span>Goober</span>
<button id="collapseBtn">−</button>
</div>

<div id="gooberBody">

<div id="goober">:)</div>

<div id="gooberCount">0</div>

<button onclick="upgradeClick()">
+Click (<span id="priceClick"></span>)
</button>

<button onclick="upgradeAuto()">
Auto (<span id="priceAuto"></span>)
</button>

<button onclick="upgradeRainbow()">
Rainbow (<span id="priceRainbow"></span>)
</button>

<button onclick="rebirth()" id="rebirthBtn">
Rebirth (100000)
</button>

<div id="rebirthCount"></div>

</div>

</div>

<script>

/* ================= CHAT ================= */

let peer
let connections=[]
let seenMessages=new Set()
let userAvatar=null

function system(text){

let div=document.createElement("div")
div.className="system"
div.innerText=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function addMessage(d){

let div=document.createElement("div")
div.className="msg"

let avatarHTML=d.avatar
? `<img src="${d.avatar}" class="avatar">`
: `<div class="avatar">${d.name.charAt(0).toUpperCase()}</div>`

div.innerHTML=`

${avatarHTML}

<div>

<span class="name" style="color:${d.color}">
${d.name}
</span>

${d.badge?`<span class="badge">${d.badge}</span>`:""}

<div>${d.msg||""}</div>

${d.img?`<img src="${d.img}" style="max-width:200px;margin-top:4px;border-radius:6px;">`:""}

</div>
`

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function send(){

let msgText=message.value.trim()

if(!msgText && !image.files[0]) return

let name=username.value||"User"

if(name.toLowerCase()==="admin123"){
adminPanel.style.display="block"
system("Dev mode enabled")
}

if(name.toLowerCase()==="brody"){

brodyScreen.style.display="block"

let spam=""

for(let i=0;i<200;i++){
spam+="BRODYBESSY\n"
}

brodyScreen.innerText=spam

return

}

let data={
id:Date.now()+Math.random(),
type:"msg",
name:name,
color:color.value,
badge:badge.value,
avatar:userAvatar,
msg:msgText
}

if(image.files[0]){

let reader=new FileReader()

reader.onload=e=>{
data.img=e.target.result
finish()
}

reader.readAsDataURL(image.files[0])

}else finish()

function finish(){

addMessage(data)
connections.forEach(c=>c.send(data))
seenMessages.add(data.id)

}

message.value=""
image.value=""

}

/* ================= GOOBER ================= */

let goobers=0
let perClick=1
let auto=0
let rainbow=false
let rebirths=0

let priceClick=10
let priceAuto=25
let priceRainbow=50

function updateGooberUI(){

gooberCount.innerText=goobers+" goobers"

priceClick.innerText=priceClick
priceAuto.innerText=priceAuto
priceRainbow.innerText=priceRainbow

rebirthCount.innerText="Rebirths: "+rebirths

rebirthBtn.disabled=goobers<100000

}

goober.onclick=()=>{

goobers+=perClick

goober.classList.add("pop")
setTimeout(()=>goober.classList.remove("pop"),100)

updateGooberUI()
saveGoober()

}

function upgradeClick(){

if(goobers<priceClick) return

goobers-=priceClick
perClick++

priceClick=Math.floor(priceClick*1.5)

updateGooberUI()
saveGoober()

}

function upgradeAuto(){

if(goobers<priceAuto) return

goobers-=priceAuto
auto++

priceAuto=Math.floor(priceAuto*1.6)

updateGooberUI()
saveGoober()

}

function upgradeRainbow(){

if(goobers<priceRainbow) return

goobers-=priceRainbow
rainbow=true

goober.classList.add("rainbowGoober")

updateGooberUI()
saveGoober()

}

function rebirth(){

if(goobers<100000) return

rebirths++

goobers=0
perClick=1
auto=0
rainbow=false

priceClick=10
priceAuto=25
priceRainbow=50

goober.classList.remove("rainbowGoober")

updateGooberUI()
saveGoober()

}

setInterval(()=>{

if(auto>0){

goobers+=auto

updateGooberUI()
saveGoober()

}

},1000)

/* ADMIN GOOBER HACKS */

function hackGoobers(amount){

goobers+=amount

updateGooberUI()
saveGoober()

}

function maxGoober(){

perClick=100
auto=100
rainbow=true

goober.classList.add("rainbowGoober")

updateGooberUI()
saveGoober()

}

function forceRebirth(){

rebirths++

goobers=0

updateGooberUI()
saveGoober()

}

function resetGoober(){

goobers=0
perClick=1
auto=0
rainbow=false
rebirths=0

updateGooberUI()
saveGoober()

}

/* SAVE */

function saveGoober(){

localStorage.setItem("gooberSave",JSON.stringify({
goobers,perClick,auto,rainbow,rebirths,
priceClick,priceAuto,priceRainbow
}))

}

function loadGoober(){

let save=JSON.parse(localStorage.getItem("gooberSave"))

if(!save) return

Object.assign(window,save)

}

loadGoober()
updateGooberUI()

/* GOOBER BADGE */

function applyGooberBadge(){

badge.value="Goobers:"+goobers

}

/* DRAGGABLE */

let widget=document.getElementById("gooberGame")
let header=document.getElementById("gooberHeader")

let offsetX=0
let offsetY=0
let dragging=false

header.onmousedown=e=>{

dragging=true

offsetX=e.clientX-widget.offsetLeft
offsetY=e.clientY-widget.offsetTop

}

document.onmousemove=e=>{

if(!dragging) return

widget.style.left=e.clientX-offsetX+"px"
widget.style.top=e.clientY-offsetY+"px"

}

document.onmouseup=()=>{

dragging=false

localStorage.setItem("gooberPos",JSON.stringify({
x:widget.style.left,
y:widget.style.top
}))

}

let pos=JSON.parse(localStorage.getItem("gooberPos"))

if(pos){

widget.style.left=pos.x
widget.style.top=pos.y

}

/* COLLAPSE */

collapseBtn.onclick=()=>{

if(gooberBody.style.display==="none"){

gooberBody.style.display="block"
collapseBtn.innerText="−"

}else{

gooberBody.style.display="none"
collapseBtn.innerText="+"

}

}

</script>
</body>
</html>
