<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bhys Chat</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:260px;
min-width:260px;
background:#111827;
padding:15px;
border-right:1px solid #1f2937;
overflow:auto;
position:relative;
z-index:2;
}

#sidebar input,#sidebar button,#sidebar select{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#1d4ed8;}

#main{
flex:1;
display:flex;
flex-direction:column;
position:relative;
z-index:1;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.name{font-weight:bold;}
.time{font-size:11px;opacity:.6;margin-left:6px;}

.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

.system{
opacity:.7;
font-style:italic;
margin:6px 0;
}

.typing{
font-size:12px;
opacity:.6;
padding-left:15px;
}

/* INPUT BAR */

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input[type="text"]{
flex:1;
padding:8px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

/* SETTINGS */

#settingsPanel{
margin-top:15px;
padding:10px;
background:#1f2937;
border-radius:8px;
}

/* MOBILE */

#menuBtn{
display:none;
position:absolute;
top:10px;
left:10px;
z-index:10;
padding:6px 10px;
border-radius:6px;
background:#2563eb;
}

@media (max-width:700px){

#menuBtn{display:block;}

#sidebar{
position:absolute;
height:100%;
left:-260px;
z-index:5;
}

#sidebar.open{
left:0;
}

}

/* IMAGE VIEWER */

#imageViewer{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#imageViewer img{
max-width:90%;
max-height:90%;
border-radius:8px;
}

/* PARTICLES */

#particles{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

/* THEMES */

.theme-neon{
background:#020617;
color:#00ffff;
text-shadow:0 0 6px #00ffff,0 0 15px #00ffff;
}

.theme-glass #sidebar,
.theme-glass #inputbar,
.theme-glass .msg{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
}

.theme-liquid{
background:linear-gradient(-45deg,#1e3a8a,#0ea5e9,#2563eb,#38bdf8);
background-size:400% 400%;
animation:liquidFlow 12s ease infinite;
}

@keyframes liquidFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.theme-fire{
background:#1a0000;
color:#ffd7a3;
}

.theme-fire .msg{
text-shadow:0 0 6px #ff6a00;
}

.theme-ice{
background:#0b1a2b;
color:#dff6ff;
}

.theme-ice .msg{
text-shadow:0 0 6px #7dd3fc;
}

.theme-hot{
background:linear-gradient(#3b0000,#7f1d1d);
color:#ffedd5;
}

.theme-cold{
background:linear-gradient(#020617,#1e3a8a);
color:#dbeafe;
}

.theme-rainbow{
animation:hueShift 8s linear infinite;
}

@keyframes hueShift{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}



/* === NEW THEMES === */

/* Litany Theme */
.theme-litany{
background:linear-gradient(to top,#1a1a1a,#444,#bfbfbf);
color:#d4d4d4;
position:relative;
overflow:hidden;
}

/* Pixelated jitter overlay */
.theme-litany::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
linear-gradient(0deg,rgba(255,255,255,0.04) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);
background-size:5px 5px;
animation:litanyJitter 0.15s steps(2) infinite;
}

@keyframes litanyJitter{
0%{transform:translate(0,0)}
25%{transform:translate(1px,-1px)}
50%{transform:translate(-1px,1px)}
75%{transform:translate(1px,1px)}
100%{transform:translate(0,0)}
}

/* Rusty gears */
.theme-litany .gear{
position:fixed;
border-radius:50%;
border:6px solid rgba(120,60,20,0.5);
box-shadow:0 0 15px rgba(80,40,10,0.4) inset;
opacity:0.25;
animation:spinGear linear infinite;
}

.theme-litany .gear::before{
content:"";
position:absolute;
inset:-6px;
border-radius:50%;
border:4px dashed rgba(120,60,20,0.4);
}

/* different sizes + speeds */
.theme-litany .gear1{width:120px;height:120px;top:20%;left:20%;animation-duration:18s;}
.theme-litany .gear2{width:180px;height:180px;top:50%;left:60%;animation-duration:25s;animation-direction:reverse;}
.theme-litany .gear3{width:90px;height:90px;top:70%;left:30%;animation-duration:14s;}

@keyframes spinGear{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
95%{transform:scaleY(0.1) rotate(45deg)}
}


/* Sorrow Theme */
.theme-sorrow{
background:linear-gradient(160deg,#1a0000,#3b0000,#7a0000);
color:#ff4d4d;
position:relative;
overflow:hidden;
}

/* Rain effect */
.theme-sorrow::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:repeating-linear-gradient(
120deg,
rgba(255,0,0,0.25) 0px,
rgba(255,0,0,0.25) 2px,
transparent 2px,
transparent 20px
);
animation:sorrowRain 0.5s linear infinite;
z-index:0;
}

@keyframes sorrowRain{
0%{background-position:0 0;}
100%{background-position:200px 400px;}
}

/* Ocean layer */
.theme-sorrow::after{
content:"";
position:fixed;
bottom:0;
left:0;
width:200%;
height:180px;
background:radial-gradient(circle at 50% 0%,#ff0000 0%,#8b0000 60%,transparent 100%);
animation:sorrowWave 6s ease-in-out infinite alternate;
opacity:0.7;
}

@keyframes sorrowWave{
0%{transform:translateX(0) scaleY(1);}
100%{transform:translateX(-25%) scaleY(1.2);}
}

.theme-sorrow #sidebar,
.theme-sorrow #inputbar,
.theme-sorrow .msg{
background:rgba(30,0,0,0.6);
backdrop-filter:blur(6px);
border:1px solid rgba(255,0,0,0.2);
}



/* Frutiger Aero */
.theme-aero{
background:linear-gradient(to bottom,#87cefa,#e0f7ff);
color:#003b5c;
}

.theme-aero #sidebar,
.theme-aero #inputbar,
.theme-aero .msg{
background:rgba(255,255,255,0.35);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.6);
box-shadow:0 0 20px rgba(0,150,255,0.25);
}

.theme-aero .msg{
border-radius:12px;
}

.theme-aero::before{
content:"";
position:fixed;
inset:0;
background:url('https://i.imgur.com/8IuucQZ.png') no-repeat center/cover;
opacity:0.15;
pointer-events:none;
}

/* Minimal Dark */
.theme-minimal{
background:#0a0a0a;
color:#e5e5e5;
}

/* Soft Light */
.theme-soft{
background:#f4f4f5;
color:#111;
}

.theme-soft #sidebar,
.theme-soft #inputbar{
background:#ffffff;
}

/* Terminal */
.theme-terminal{
background:#000;
color:#00ff9f;
font-family:monospace;
}

.theme-terminal .msg{
text-shadow:0 0 5px #00ff9f;
}

/* Sunset */
.theme-sunset{
background:linear-gradient(135deg,#ff7e5f,#feb47b);
color:#fff;
}

/* Ocean */
.theme-ocean{
background:linear-gradient(#021e3a,#03506f);
color:#a5f3fc;
}

.theme-ocean .msg{
text-shadow:0 0 6px #22d3ee;
}

/* Forest */
.theme-forest{
background:linear-gradient(#0f2f1f,#1b5e20);
color:#d9f99d;
}

/* Retro 90s */
.theme-retro{
background:#ff00ff;
color:#00ffff;
}

/* Zen Theme */
.theme-zen{
background:linear-gradient(to bottom,#1a102f,#3b1e6b,#6b4bb3);
color:#e9d5ff;
position:relative;
overflow:hidden;
}

/* Stars */
.theme-zen::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:radial-gradient(2px 2px at 20% 30%,#e9d5ff,transparent),
radial-gradient(2px 2px at 70% 20%,#e9d5ff,transparent),
radial-gradient(1.5px 1.5px at 40% 80%,#e9d5ff,transparent),
radial-gradient(1.5px 1.5px at 80% 60%,#e9d5ff,transparent);
animation:zenStars 4s ease-in-out infinite alternate;
opacity:0.6;
}

@keyframes zenStars{
0%{opacity:0.3}
100%{opacity:0.8}
}

/* Horizon land */
.theme-zen::after{
content:"";
position:fixed;
bottom:0;
left:0;
width:100%;
height:180px;
background:linear-gradient(to top,#2a0f4d,#4c1d95);
clip-path:polygon(0 60%,10% 65%,20% 62%,30% 70%,40% 66%,50% 72%,60% 68%,70% 75%,80% 70%,90% 74%,100% 68%,100% 100%,0 100%);
opacity:0.8;
}

/* glass blades */
.theme-zen .blade{
position:fixed;
bottom:0;
width:6px;
height:40px;
background:linear-gradient(#c4b5fd,#7c3aed);
opacity:0.4;
border-radius:3px;
}

.theme-zen .blade:nth-child(1){left:10%;height:50px}
.theme-zen .blade:nth-child(2){left:25%;height:35px}
.theme-zen .blade:nth-child(3){left:40%;height:60px}
.theme-zen .blade:nth-child(4){left:55%;height:30px}
.theme-zen .blade:nth-child(5){left:70%;height:45px}
.theme-zen .blade:nth-child(6){left:85%;height:55px}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="imageViewer" onclick="closeImage()">
<img id="viewerImg">
</div>

<button id="menuBtn" onclick="toggleMenu()">☰</button>

<div id="sidebar">

<h2>Bhys Chat</h2>

<h3>Room</h3>
<input id="room" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<h3>Profile</h3>
<input id="username" placeholder="Name">
<input type="color" id="color" value="#60a5fa">
<input id="badge" placeholder="Badge">
<input type="file" id="avatarUpload" accept="image/*">

<div id="settingsPanel">
<h3>Settings</h3>

<select onchange="setTheme(this.value)">
<option value="">Default</option>
<option value="theme-aero">Frutiger Aero 🌊</option>
<option value="theme-rainbow">All Colors</option>
<option value="theme-neon">Neon Lights</option>
<option value="theme-glass">Glassy</option>
<option value="theme-liquid">Liquid</option>
<option value="theme-fire">Fire</option>
<option value="theme-ice">Ice</option>
<option value="theme-hot">Hot</option>
<option value="theme-cold">Cold</option>
<option value="theme-minimal">Minimal Dark</option>
<option value="theme-soft">Soft Light</option>
<option value="theme-terminal">Terminal</option>
<option value="theme-sunset">Sunset</option>
<option value="theme-ocean">Ocean</option>
<option value="theme-forest">Forest</option>
<option value="theme-retro">Retro 90s</option>
<option value="theme-sorrow">Sorrow 🩸</option>
<option value="theme-litany">Litany 👁️</option>
<option value="theme-zen">Zen ☯️</option>
<option value="">Default</option>
<option value="theme-rainbow">All Colors</option>
<option value="theme-neon">Neon Lights</option>
<option value="theme-glass">Glassy</option>
<option value="theme-liquid">Liquid</option>
<option value="theme-fire">Fire</option>
<option value="theme-ice">Ice</option>
<option value="theme-hot">Hot</option>
<option value="theme-cold">Cold</option>
</select>

</div>

</div>

<div id="main">

<!-- Zen Blades -->
<div class="blade"></div>
<div class="blade"></div>
<div class="blade"></div>
<div class="blade"></div>
<div class="blade"></div>
<div class="blade"></div>

<!-- Litany Gears -->
<div class="gear gear1"></div>
<div class="gear gear2"></div>
<div class="gear gear3"></div>

<div id="chat"></div>
<div id="typing" class="typing"></div>

<div id="inputbar">
<input id="message" type="text" placeholder="Message...">
<input type="file" id="fileUpload">
<button onclick="send()">Send</button>
</div>

</div>

<script>

let mode=""
function setTheme(t){
document.body.className=""
mode=""
if(t){
document.body.classList.add(t)
if(t==="theme-fire") mode="fire"
if(t==="theme-ice") mode="ice"
if(t==="theme-sorrow") mode="sorrow"
if(t==="theme-zen") mode="zen"
}
}

function toggleMenu(){sidebar.classList.toggle("open")}
function openImage(src){viewerImg.src=src;imageViewer.style.display="flex"}
function closeImage(){imageViewer.style.display="none"}

let peer=null
let connections=[]
let seenMessages=new Set()
let messageHistory=[]
let userAvatar=null
let typingTimer=null

const chat=document.getElementById("chat")
const typingDiv=document.getElementById("typing")

message.addEventListener("keydown",e=>{if(e.key==="Enter") send()})

message.addEventListener("input",()=>{
broadcast({type:"typing",name:username.value||"User"})
clearTimeout(typingTimer)
typingTimer=setTimeout(()=>{broadcast({type:"stopTyping"})},1200)
})

function system(text){
const div=document.createElement("div")
div.className="system"
div.innerText=text
chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
}

avatarUpload.addEventListener("change",()=>{
const file=avatarUpload.files[0]
if(!file) return
const reader=new FileReader()
reader.onload=e=>{userAvatar=e.target.result}
reader.readAsDataURL(file)
})

function closePeer(){
if(peer){peer.destroy();peer=null}
connections=[]
}

function setupConnection(conn){

if(connections.includes(conn)) return
connections.push(conn)

conn.on("data",handleData)

conn.on("open",()=>{
conn.send({type:"history",messages:messageHistory})
})

conn.on("close",()=>{
connections=connections.filter(c=>c!==conn)
system("User disconnected")
})
}

function createRoom(){
closePeer()
let roomName=room.value.trim()
if(!roomName){alert("Enter room name");return}

peer=new Peer(roomName)

peer.on("open",()=>{
system("Room created: "+roomName)
system("You are the host")
})

peer.on("error",err=>{
if(err.type==="unavailable-id"){
alert("Room name already taken")
}
})

peer.on("connection",conn=>{

conn.on("open",()=>{
system("User joined room")
setupConnection(conn)
})

conn.on("error",()=>{
system("A user failed to connect")
})

})
}

function joinRoom(){
const roomName=room.value.trim()
if(!roomName) return

closePeer()
peer=new Peer()

peer.on("open",()=>{
const conn=peer.connect(roomName,{
reliable:true,
serialization:"json"
})

let connected=false

conn.on("open",()=>{
connected=true
setupConnection(conn)
system("You joined room: "+roomName)
conn.send({type:"system",msg:(username.value||"User")+" joined the room"})
})

setTimeout(()=>{
if(!connected){
alert("Failed to connect to room")
conn.close()
}
},5000)

conn.on("error",()=>{
alert("Failed to join room")
})
})
}

function addMessage(d){
const div=document.createElement("div")
div.className="msg"
const time=new Date(d.time).toLocaleTimeString()
let avatarHTML=d.avatar
? `<div class="avatar"><img src="${d.avatar}"></div>`
: `<div class="avatar">${d.name.charAt(0).toUpperCase()}</div>`
let fileHTML=""
if(d.file){
if(d.file.name.match(/\.(png|jpg|jpeg|gif|webp)$/i)){
fileHTML=`<img src="${d.file.data}" style="max-width:200px;border-radius:6px;margin-top:5px;cursor:pointer;" onclick="openImage('${d.file.data}')">`
}else{
fileHTML=`<a href="${d.file.data}" download="${d.file.name}">📎 ${d.file.name}</a>`
}
}

div.innerHTML=`
${avatarHTML}
<div>
<span class="name" style="color:${d.color}">${d.name}</span>
${d.badge?`<span class="badge">${d.badge}</span>`:""}
<span class="time">${time}</span>
<div>${d.msg||""}</div>
${fileHTML}
</div>`

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
}

function send(){
const text=message.value.trim()
const file=fileUpload.files[0]
if(!text && !file) return

const data={
id:Date.now()+Math.random(),
type:"msg",
name:username.value||"User",
color:color.value,
badge:badge.value,
avatar:userAvatar,
time:Date.now(),
msg:text
}

if(file){
const reader=new FileReader()
reader.onload=e=>{data.file={name:file.name,data:e.target.result};finish()}
reader.readAsDataURL(file)
}else finish()

function finish(){
addMessage(data)
messageHistory.push(data)
seenMessages.add(data.id)
broadcast(data)
}

message.value=""
fileUpload.value=""
}

function handleData(data){
if(data.type==="history"){
data.messages.forEach(m=>{
if(!seenMessages.has(m.id)){
seenMessages.add(m.id)
addMessage(m)
}
})
return
}

if(data.type==="system"){system(data.msg);return}
if(data.type==="typing"){typingDiv.innerText=data.name+" is typing...";return}
if(data.type==="stopTyping"){typingDiv.innerText="";return}
if(data.type!=="msg") return
if(seenMessages.has(data.id)) return

seenMessages.add(data.id)
addMessage(data)
messageHistory.push(data)

broadcast(data) // relay for full mesh reliability
}

function broadcast(data){
connections.forEach(c=>{if(c.open) c.send(data)})
}

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")
let particles=[]

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener("resize",resize)
resize()

function spawnParticle(){

if(mode==="sorrow"){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:-2 - Math.random()*2,
vy:4 + Math.random()*3,
size:Math.random()*2+1,
life:80,
type:"rain"
})
return
}

if(mode==="zen"){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:0,
vy:0,
size:Math.random()*1.5+0.5,
life:200,
type:"star"
})
return
}

particles.push({
x:Math.random()*canvas.width,
y:canvas.height,
vx:(Math.random()-.5)*0.5,
vy:-Math.random()*2-1,
size:Math.random()*4+1,
life:100,
type:"normal"
})
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
p.life--

ctx.beginPath()

if(mode==="fire"){
ctx.fillStyle="orange"
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()
}
else if(mode==="ice"){
ctx.fillStyle="lightblue"
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()
}
else if(mode==="sorrow"){
ctx.strokeStyle="rgba(255,0,0,0.6)"
ctx.lineWidth=1.5
ctx.moveTo(p.x,p.y)
ctx.lineTo(p.x + p.vx*2, p.y + p.vy*2)
ctx.stroke()
}
else if(mode==="zen"){
ctx.fillStyle="rgba(220,200,255,0.8)"
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()
}
else{
ctx.fillStyle="white"
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()
}

})

particles=particles.filter(p=>p.life>0)

requestAnimationFrame(draw)
}


setInterval(()=>{
if(mode==="fire"||mode==="ice") spawnParticle()
if(mode==="sorrow"){
for(let i=0;i<6;i++) spawnParticle()
}
if(mode==="zen"){
for(let i=0;i<2;i++) spawnParticle()
}
},80)

draw()

</script>

</body>
</html>
