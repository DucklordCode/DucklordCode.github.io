<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MiniChat+</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

#sidebar{
width:260px;
background:#111827;
padding:15px;
overflow:auto;
border-right:1px solid #1f2937;
}

#sidebar h3{margin-top:15px;}
#sidebar input, #sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
cursor:pointer;
background:#2563eb;
color:white;
font-weight:bold;
}
button:hover{background:#1d4ed8;}

#main{
flex:1;
display:flex;
flex-direction:column;
min-width:0;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
object-fit:cover;
}

.name{font-weight:bold;}
.time{font-size:11px;opacity:.6;margin-left:6px;}
.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input{
flex:1;
padding:8px;
border-radius:6px;
border:none;
}

#users{
width:200px;
background:#111827;
padding:10px;
overflow:auto;
border-left:1px solid #1f2937;
}

.system{
opacity:.7;
font-style:italic;
margin:6px 0;
}

#typing{
font-size:12px;
opacity:.7;
padding-left:15px;
}

@media(max-width:900px){
body{flex-direction:column;}
#sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid #1f2937;}
#users{display:none;}
}

</style>
</head>

<body>

<div id="sidebar">
<h2>MiniChat+</h2>

<h3>Room</h3>
<input id="room" placeholder="Room name" />
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>
<div id="inviteBox"></div>

<h3>Profile</h3>
<input id="username" placeholder="Name" />
<input type="color" id="color" value="#60a5fa" />
<input id="badge" placeholder="Badge" />
<input type="file" id="avatar" accept="image/*" />
</div>

<div id="main">
<div id="chat"></div>
<div id="typing"></div>
<div id="inputbar">
<input id="message" placeholder="Message..." />
<input type="file" id="image" accept="image/*" />
<button onclick="send()">Send</button>
</div>
</div>

<div id="users">
<h3>Online</h3>
<div id="userList"></div>
</div>

<script>
let peer;
let connections=[];
let seenMessages=new Set();

function system(text){
const div=document.createElement("div");
div.className="system";
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function closePeer(){
if(peer){ peer.destroy(); }
connections=[];
seenMessages.clear();
}

function createRoom(){
closePeer();
const roomName=room.value || Math.random().toString(36).substring(2,8);
room.value=roomName;
peer=new Peer(roomName);
setupPeer();
system("Room created");
showInvite(roomName);
}

function joinRoom(){
if(!room.value) return;
closePeer();
peer=new Peer();
setupPeer(()=>{
const conn=peer.connect(room.value);
setupConnection(conn);
});
}

function setupPeer(onOpen){
peer.on("open",()=>{ if(onOpen) onOpen(); });
peer.on("connection",conn=>{ setupConnection(conn); });
}

function setupConnection(conn){
connections.push(conn);
conn.on("data",handleData);
conn.on("close",()=>system("User disconnected"));
}

function broadcast(data){
connections.forEach(c=>c.send(data));
}

function send(){
const msgText=message.value.trim();
if(!msgText && !image.files[0]) return;

const data={
id:Date.now()+Math.random(),
type:"msg",
name:username.value||"User",
color:color.value,
badge:badge.value,
time:Date.now()
};

if(image.files[0]){
const reader=new FileReader();
reader.onload=e=>{ data.img=e.target.result; finalize(data); };
reader.readAsDataURL(image.files[0]);
}else{
finalize(data);
}

function finalize(data){
data.msg=msgText;
addMessage(data);
broadcast(data);
seenMessages.add(data.id);
}

message.value="";
image.value="";
}

function handleData(data){
if(data.type!=="msg") return;
if(seenMessages.has(data.id)) return;
seenMessages.add(data.id);
addMessage(data);
}

function addMessage(d){
const div=document.createElement("div");
div.className="msg";
const avatar=d.avatar || "https://i.imgur.com/6VBx3io.png";
const time=new Date(d.time).toLocaleTimeString();
const safeMsg=(d.msg||"").replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');

div.innerHTML=`
<img class="avatar" src="${avatar}">
<div>
<span class="name" style="color:${d.color}">${d.name}</span>
${d.badge?`<span class="badge">${d.badge}</span>`:""}
<span class="time">${time}</span>
<div>${safeMsg}</div>
${d.img?`<img src="${d.img}" style="max-width:220px;border-radius:8px;margin-top:5px;">`:""}
</div>`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function showInvite(roomName){
const link=location.origin+location.pathname+"?room="+roomName;
inviteBox.innerHTML=`
<input id="inviteLink" value="${link}" readonly>
<button onclick="navigator.clipboard.writeText(inviteLink.value)">Copy Link</button>
`;
}

message.addEventListener("keypress",e=>{ if(e.key==="Enter") send(); });

const params=new URLSearchParams(location.search);
if(params.get("room")){
room.value=params.get("room");
joinRoom();
}
</script>

</body>
</html>
