```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bhys Chat</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:260px;
min-width:260px;
background:#111827;
padding:15px;
border-right:1px solid #1f2937;
overflow:auto;
position:relative;
z-index:2;
}

#sidebar input,#sidebar button,#sidebar select{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#1d4ed8;}

#main{
flex:1;
display:flex;
flex-direction:column;
position:relative;
z-index:1;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.name{font-weight:bold;}
.time{font-size:11px;opacity:.6;margin-left:6px;}

.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

.system{
opacity:.7;
font-style:italic;
margin:6px 0;
}

.typing{
font-size:12px;
opacity:.6;
padding-left:15px;
}

/* INPUT BAR */

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input[type="text"]{
flex:1;
padding:8px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

/* SETTINGS */

#settingsPanel{
margin-top:15px;
padding:10px;
background:#1f2937;
border-radius:8px;
}

/* MOBILE */

#menuBtn{
display:none;
position:absolute;
top:10px;
left:10px;
z-index:10;
padding:6px 10px;
border-radius:6px;
background:#2563eb;
}

@media (max-width:700px){

#menuBtn{display:block;}

#sidebar{
position:absolute;
height:100%;
left:-260px;
z-index:5;
}

#sidebar.open{
left:0;
}

}

/* IMAGE VIEWER */

#imageViewer{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#imageViewer img{
max-width:90%;
max-height:90%;
border-radius:8px;
}

/* PARTICLES */

#particles{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

/* THEMES */

/* Neon */

.theme-neon{
background:#020617;
color:#00ffff;
text-shadow:0 0 6px #00ffff,0 0 15px #00ffff;
}

/* Glass */

.theme-glass #sidebar,
.theme-glass #inputbar,
.theme-glass .msg{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
}

/* Liquid */

.theme-liquid{
background:linear-gradient(-45deg,#1e3a8a,#0ea5e9,#2563eb,#38bdf8);
background-size:400% 400%;
animation:liquidFlow 12s ease infinite;
}

@keyframes liquidFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Fire */

.theme-fire{
background:#1a0000;
color:#ffd7a3;
}

.theme-fire .msg{
text-shadow:0 0 6px #ff6a00;
}

/* Ice */

.theme-ice{
background:#0b1a2b;
color:#dff6ff;
}

.theme-ice .msg{
text-shadow:0 0 6px #7dd3fc;
}

/* Hot */

.theme-hot{
background:linear-gradient(#3b0000,#7f1d1d);
color:#ffedd5;
}

/* Cold */

.theme-cold{
background:linear-gradient(#020617,#1e3a8a);
color:#dbeafe;
}

/* Rainbow */

.theme-rainbow{
animation:hueShift 8s linear infinite;
}

@keyframes hueShift{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="imageViewer" onclick="closeImage()">
<img id="viewerImg">
</div>

<button id="menuBtn" onclick="toggleMenu()">☰</button>

<div id="sidebar">

<h2>Bhys Chat</h2>

<h3>Room</h3>
<input id="room" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<h3>Profile</h3>
<input id="username" placeholder="Name">
<input type="color" id="color" value="#60a5fa">
<input id="badge" placeholder="Badge">
<input type="file" id="avatarUpload" accept="image/*">

<div id="settingsPanel">
<h3>Settings</h3>

<select onchange="setTheme(this.value)">
<option value="">Default</option>
<option value="theme-rainbow">All Colors</option>
<option value="theme-neon">Neon Lights</option>
<option value="theme-glass">Glassy</option>
<option value="theme-liquid">Liquid</option>
<option value="theme-fire">Fire</option>
<option value="theme-ice">Ice</option>
<option value="theme-hot">Hot</option>
<option value="theme-cold">Cold</option>
</select>

</div>

</div>

<div id="main">

<div id="chat"></div>
<div id="typing" class="typing"></div>

<div id="inputbar">
<input id="message" type="text" placeholder="Message...">
<input type="file" id="fileUpload">
<button onclick="send()">Send</button>
</div>

</div>

<script>

/* THEME SYSTEM */

let mode=""

function setTheme(t){

document.body.className=""
mode=""

if(t){
document.body.classList.add(t)

if(t==="theme-fire") mode="fire"
if(t==="theme-ice") mode="ice"
}

}

/* MOBILE MENU */

function toggleMenu(){
sidebar.classList.toggle("open")
}

/* IMAGE VIEWER */

function openImage(src){
viewerImg.src=src
imageViewer.style.display="flex"
}

function closeImage(){
imageViewer.style.display="none"
}

/* CHAT SYSTEM */

let peer=null
let connections=[]
let seenMessages=new Set()
let messageHistory=[]
let userAvatar=null
let typingTimer=null

const chat=document.getElementById("chat")
const typingDiv=document.getElementById("typing")

message.addEventListener("keydown",e=>{
if(e.key==="Enter") send()
})

message.addEventListener("input",()=>{

broadcast({type:"typing",name:username.value||"User"})

clearTimeout(typingTimer)

typingTimer=setTimeout(()=>{
broadcast({type:"stopTyping"})
},1500)

})

function system(text){
const div=document.createElement("div")
div.className="system"
div.innerText=text
chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
}

avatarUpload.addEventListener("change",()=>{

const file=avatarUpload.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=e=>{
userAvatar=e.target.result
}

reader.readAsDataURL(file)

})

function closePeer(){
if(peer){peer.destroy();peer=null}
connections=[]
}

function setupConnection(conn){

connections.push(conn)

conn.on("open",()=>{
conn.send({type:"history",messages:messageHistory})
})

conn.on("data",handleData)

conn.on("close",()=>{
system("User disconnected")
})

}

function createRoom(){

closePeer()

let roomName=room.value.trim()

if(!roomName){
roomName=Math.random().toString(36).substring(2,8)
room.value=roomName
}

peer=new Peer(roomName)

peer.on("open",()=>{
system("Room created: "+roomName)
system("You are the host")
})

peer.on("connection",conn=>{
system("User joined room")
setupConnection(conn)
})

}

function joinRoom(){

const roomName=room.value.trim()
if(!roomName) return

closePeer()

peer=new Peer()

peer.on("open",()=>{

const conn=peer.connect(roomName)

conn.on("open",()=>{

system("You joined room: "+roomName)

broadcast({
type:"system",
msg:(username.value||"User")+" joined the room"
})

})

setupConnection(conn)

})

}

function addMessage(d){

const div=document.createElement("div")
div.className="msg"

const time=new Date(d.time).toLocaleTimeString()

let avatarHTML=d.avatar
? `<div class="avatar"><img src="${d.avatar}"></div>`
: `<div class="avatar">${d.name.charAt(0).toUpperCase()}</div>`

let fileHTML=""

if(d.file){

if(d.file.name.match(/\.(png|jpg|jpeg|gif|webp)$/i)){
fileHTML=`<img src="${d.file.data}" style="max-width:200px;border-radius:6px;margin-top:5px;cursor:pointer;" onclick="openImage('${d.file.data}')">`
}else{
fileHTML=`<a href="${d.file.data}" download="${d.file.name}">📎 ${d.file.name}</a>`
}

}

div.innerHTML=`

${avatarHTML}

<div>

<span class="name" style="color:${d.color}">${d.name}</span>
${d.badge?`<span class="badge">${d.badge}</span>`:""}
<span class="time">${time}</span>

<div>${d.msg||""}</div>

${fileHTML}

</div>

`

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function send(){

const text=message.value.trim()
const file=fileUpload.files[0]

if(!text && !file) return

const data={
id:Date.now()+Math.random(),
type:"msg",
name:username.value||"User",
color:color.value,
badge:badge.value,
avatar:userAvatar,
time:Date.now(),
msg:text
}

if(file){

const reader=new FileReader()

reader.onload=e=>{
data.file={name:file.name,data:e.target.result}
finish()
}

reader.readAsDataURL(file)

}else{
finish()
}

function finish(){

addMessage(data)
messageHistory.push(data)
broadcast(data)
seenMessages.add(data.id)

}

message.value=""
fileUpload.value=""

}

function handleData(data){

if(data.type==="history"){

data.messages.forEach(m=>{
if(!seenMessages.has(m.id)){
seenMessages.add(m.id)
addMessage(m)
}
})

return
}

if(data.type==="system"){
system(data.msg)
return
}

if(data.type==="typing"){
typingDiv.innerText=data.name+" is typing..."
return
}

if(data.type==="stopTyping"){
typingDiv.innerText=""
return
}

if(data.type!=="msg") return

if(seenMessages.has(data.id)) return

seenMessages.add(data.id)

addMessage(data)
messageHistory.push(data)

}

function broadcast(data){
connections.forEach(c=>{
if(c.open) c.send(data)
})
}

/* PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

let particles=[]

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

window.addEventListener("resize",resize)
resize()

function spawnParticle(){

particles.push({
x:Math.random()*canvas.width,
y:canvas.height,
vx:(Math.random()-.5)*0.5,
vy:-Math.random()*2-1,
size:Math.random()*4+1,
life:100
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.beginPath()

if(mode==="fire"){
ctx.fillStyle="orange"
}else if(mode==="ice"){
ctx.fillStyle="lightblue"
}

ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

})

particles=particles.filter(p=>p.life>0)

requestAnimationFrame(draw)

}

setInterval(()=>{
if(mode==="fire"||mode==="ice"){
spawnParticle()
}
},80)

draw()

</script>

</body>
</html>
