<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bhys Chat</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
transition:filter 0.4s;
}

/* 🌈 Rainbow Mode */
.rainbow-mode{
animation:hueShift 6s linear infinite;
}

@keyframes hueShift{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

/* ✨ Mystic Mode (NEW EFFECT) */
.mystic-mode{
animation:pulseGlow 2s ease-in-out infinite;
}

@keyframes pulseGlow{
0%{box-shadow:0 0 0px #a855f7;}
50%{box-shadow:0 0 40px #a855f7;}
100%{box-shadow:0 0 0px #a855f7;}
}

/* 💙 Brody Blue Error Screen */
#brodyScreen{
position:fixed;
inset:0;
background:#0078d7;
color:white;
font-family:"Lucida Console","Courier New",monospace;
padding:30px;
z-index:9999;
overflow:hidden;
display:none;
}

#brodyScreen.active{
display:block;
}

#brodySpam{
white-space:pre;
font-size:18px;
line-height:22px;
}

#sidebar{
width:260px;
background:#111827;
padding:15px;
overflow:auto;
border-right:1px solid #1f2937;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
cursor:pointer;
background:#2563eb;
color:white;
font-weight:bold;
}
button:hover{background:#1d4ed8;}

#main{
flex:1;
display:flex;
flex-direction:column;
min-width:0;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
object-fit:cover;
}

.name{font-weight:bold;}
.time{font-size:11px;opacity:.6;margin-left:6px;}

.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input{
flex:1;
padding:8px;
border-radius:6px;
border:none;
}

.system{
opacity:.7;
font-style:italic;
margin:6px 0;
}
</style>
</head>

<body>

<div id="brodyScreen">
<div id="brodySpam"></div>
</div>

<div id="sidebar">
<h2>Bhys Chat</h2>

<h3>Room</h3>
<input id="room" placeholder="Room name" />
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>
<div id="inviteBox"></div>

<h3>Profile</h3>
<input id="username" placeholder="Name" />
<input type="color" id="color" value="#60a5fa" />
<input id="badge" placeholder="Badge" />
<input type="file" id="avatarUpload" accept="image/*" />
</div>

<div id="main">
<div id="chat"></div>
<div id="inputbar">
<input id="message" placeholder="Message..." />
<button onclick="send()">Send</button>
</div>
</div>

<script>

let peer;
let connections=[];
let seenMessages=new Set();
let userAvatar=null;

/* 🌈 Rainbow Names */
function checkRainbow(name){
const rainbowNames=[
"joel",
"thomas"
];
if(rainbowNames.includes(name.toLowerCase())){
document.body.classList.add("rainbow-mode");
}else{
document.body.classList.remove("rainbow-mode");
}
}

/* ✨ Mystic Effect Names (NEW) */
function checkMystic(name){
const mysticNames=[
"darren",
"uncle ed",
"aunt anderson",
"brodybessy"
];

if(mysticNames.includes(name.toLowerCase())){
document.body.classList.add("mystic-mode");
}else{
document.body.classList.remove("mystic-mode");
}
}

/* 💙 Brody Error Mode */
function checkBrody(name){
if(name.toLowerCase()==="brody"){
document.getElementById("brodyScreen").classList.add("active");
startBrodySpam();
document.getElementById("main").style.display="none";
document.getElementById("sidebar").style.display="none";
}else{
document.getElementById("brodyScreen").classList.remove("active");
document.getElementById("main").style.display="flex";
document.getElementById("sidebar").style.display="block";
}
}

function startBrodySpam(){
const spamArea=document.getElementById("brodySpam");
let lines=[];
for(let i=0;i<400;i++){
lines.push("BRODYBESSY");
}
spamArea.textContent=lines.join("\n");
}

/* Avatar Upload */
avatarUpload.addEventListener("change",()=>{
const file=avatarUpload.files[0];
if(!file) return;
const reader=new FileReader();
reader.onload=e=>{
userAvatar=e.target.result;
};
reader.readAsDataURL(file);
});

function system(text){
const div=document.createElement("div");
div.className="system";
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function closePeer(){
if(peer){ peer.destroy(); }
connections=[];
seenMessages.clear();
}

function createRoom(){
closePeer();
const roomName=room.value || Math.random().toString(36).substring(2,8);
room.value=roomName;
peer=new Peer(roomName);
setupPeer();
system("Room created");
}

function joinRoom(){
if(!room.value) return;
closePeer();
peer=new Peer();
setupPeer(()=>{
const conn=peer.connect(room.value);
setupConnection(conn);
});
}

function setupPeer(onOpen){
peer.on("open",()=>{ if(onOpen) onOpen(); });
peer.on("connection",conn=>{ setupConnection(conn); });
}

function setupConnection(conn){
connections.push(conn);
conn.on("data",handleData);
}

function broadcast(data){
connections.forEach(c=>c.send(data));
}

function send(){
const msgText=message.value.trim();
if(!msgText) return;

const name=username.value||"User";

checkRainbow(name);
checkMystic(name);
checkBrody(name);

const data={
id:Date.now()+Math.random(),
type:"msg",
name:name,
color:color.value,
badge:badge.value,
avatar:userAvatar,
time:Date.now(),
msg:msgText
};

addMessage(data);
broadcast(data);
seenMessages.add(data.id);

message.value="";
}

function handleData(data){
if(data.type!=="msg") return;
if(seenMessages.has(data.id)) return;
seenMessages.add(data.id);
addMessage(data);
}

function addMessage(d){
const div=document.createElement("div");
div.className="msg";

const time=new Date(d.time).toLocaleTimeString();

const avatarContent=d.avatar
? `<img src="${d.avatar}" class="avatar">`
: `<div class="avatar">${d.name.charAt(0).toUpperCase()}</div>`;

div.innerHTML=`
${avatarContent}
<div>
<span class="name" style="color:${d.color}">${d.name}</span>
${d.badge?`<span class="badge">${d.badge}</span>`:""}
<span class="time">${time}</span>
<div>${d.msg}</div>
</div>`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

message.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
