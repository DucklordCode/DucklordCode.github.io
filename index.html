<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhys Chat</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
transition:filter .4s;
}

/* Sidebar */

#sidebar{
width:260px;
background:#111827;
padding:15px;
border-right:1px solid #1f2937;
overflow:auto;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#1d4ed8;}

#main{
flex:1;
display:flex;
flex-direction:column;
min-width:0;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

/* Messages */

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
}

.name{font-weight:bold;}
.time{font-size:11px;opacity:.6;margin-left:6px;}

.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

.system{
opacity:.7;
font-style:italic;
margin:6px 0;
}

/* Input */

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input[type="text"]{
flex:1;
padding:8px;
border-radius:6px;
border:none;
color:white;
background:#1f2937;
}

/* Secret Modes */

.rainbow-mode{
animation:hueShift 6s linear infinite;
}

@keyframes hueShift{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

.mystic-mode{
animation:pulseGlow 2s infinite;
}

@keyframes pulseGlow{
0%{box-shadow:0 0 0px purple;}
50%{box-shadow:0 0 30px purple;}
100%{box-shadow:0 0 0px purple;}
}

/* Brody screen */

#brodyScreen{
position:fixed;
inset:0;
background:#0078d7;
color:white;
font-family:"Lucida Console","Courier New",monospace;
padding:30px;
display:none;
z-index:9999;
overflow:hidden;
}

#brodyScreen.active{display:block;}

#brodySpam{
white-space:pre;
font-size:18px;
line-height:22px;
}

/* Admin panel */

#adminPanel{
display:none;
background:#1f2937;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div id="brodyScreen">
<div id="brodySpam"></div>
</div>

<div id="sidebar">

<h2>Bhys Chat</h2>

<h3>Room</h3>
<input id="room" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<h3>Profile</h3>
<input id="username" placeholder="Name">
<input type="color" id="color" value="#60a5fa">
<input id="badge" placeholder="Badge">
<input type="file" id="avatarUpload" accept="image/*">

<div id="adminPanel">
<h3>Dev Panel</h3>
<button onclick="clearChat()">Clear Chat</button>
<button onclick="spamSystem()">Spam Event</button>
<button onclick="toggleRainbow()">Toggle Rainbow</button>
</div>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputbar">
<input id="message" type="text" placeholder="Message...">
<input type="file" id="image" accept="image/*">
<button onclick="send()">Send</button>
</div>

</div>

<script>

let peer;
let connections=[];
let seenMessages=new Set();
let userAvatar=null;

/* ENTER KEY */

document.addEventListener("keydown",e=>{

if(e.key==="Enter"){

if(document.activeElement!==message){
message.focus();
return;
}

if(message.value.trim()!==""){
send();
}

}

});

/* SYSTEM MESSAGE */

function system(text){
const div=document.createElement("div");
div.className="system";
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* MODES */

function checkRainbow(name){
if(["joel","thomas"].includes(name.toLowerCase())){
document.body.classList.add("rainbow-mode");
}else{
document.body.classList.remove("rainbow-mode");
}
}

function checkMystic(name){
if(["darren","uncle ed","aunt anderson"].includes(name.toLowerCase())){
document.body.classList.add("mystic-mode");
}else{
document.body.classList.remove("mystic-mode");
}
}

function checkBrody(name){

if(name.toLowerCase()==="brody"){

document.getElementById("brodyScreen").classList.add("active");
document.getElementById("main").style.display="none";
document.getElementById("sidebar").style.display="none";

startBrodySpam();

}else{

document.getElementById("brodyScreen").classList.remove("active");
document.getElementById("main").style.display="flex";
document.getElementById("sidebar").style.display="block";

}

}

function startBrodySpam(){
let lines=[];
for(let i=0;i<400;i++){
lines.push("BRODYBESSY");
}
document.getElementById("brodySpam").textContent=lines.join("\n");
}

/* ADMIN */

function checkAdmin(name){
if(name.toLowerCase()==="admin123"){
adminPanel.style.display="block";
system("Dev mode enabled");
}else{
adminPanel.style.display="none";
}
}

function clearChat(){
chat.innerHTML="";
system("Chat cleared by admin");
}

function spamSystem(){
for(let i=0;i<5;i++){
system("ADMIN EVENT TRIGGERED");
}
}

function toggleRainbow(){
document.body.classList.toggle("rainbow-mode");
}

/* AVATAR */

avatarUpload.addEventListener("change",()=>{
const file=avatarUpload.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=e=>{
userAvatar=e.target.result;
};

reader.readAsDataURL(file);
});

/* ROOM SYSTEM */

function closePeer(){
if(peer) peer.destroy();
connections=[];
}

function createRoom(){

closePeer();

const roomName=room.value || Math.random().toString(36).substring(2,8);
room.value=roomName;

peer=new Peer(roomName);

peer.on("open",()=>{
system("Room created: "+roomName);
});

peer.on("connection",conn=>{
connections.push(conn);

system("A user joined the room");

conn.on("data",handleData);

conn.on("close",()=>{
system("A user left the room");
});

});

}

function joinRoom(){

if(!room.value) return;

closePeer();

peer=new Peer();

peer.on("open",()=>{

const conn=peer.connect(room.value);

connections.push(conn);

system("Joined room: "+room.value);

conn.on("data",handleData);

conn.on("close",()=>{
system("Disconnected from room");
});

});

}

/* CHAT */

function addMessage(d){

const div=document.createElement("div");
div.className="msg";

const time=new Date(d.time).toLocaleTimeString();

const avatarHTML=d.avatar
? `<img src="${d.avatar}" class="avatar">`
: `<div class="avatar">${d.name.charAt(0).toUpperCase()}</div>`;

div.innerHTML=`

${avatarHTML}

<div>
<span class="name" style="color:${d.color}">${d.name}</span>
${d.badge?`<span class="badge">${d.badge}</span>`:""}
<span class="time">${time}</span>

<div>${d.msg||""}</div>

${d.img?`<img src="${d.img}" style="max-width:200px;margin-top:4px;border-radius:6px;">`:""}

</div>
`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

}

function send(){

const msgText=message.value.trim();

if(!msgText && !image.files[0]) return;

const name=username.value||"User";

checkRainbow(name);
checkMystic(name);
checkBrody(name);
checkAdmin(name);

const data={
id:Date.now()+Math.random(),
type:"msg",
name:name,
color:color.value,
badge:badge.value,
avatar:userAvatar,
time:Date.now(),
msg:msgText
};

if(image.files[0]){

const reader=new FileReader();

reader.onload=e=>{
data.img=e.target.result;
finish();
};

reader.readAsDataURL(image.files[0]);

}else{
finish();
}

function finish(){
addMessage(data);
broadcast(data);
seenMessages.add(data.id);
}

message.value="";
image.value="";

}

function handleData(data){

if(data.type!=="msg") return;
if(seenMessages.has(data.id)) return;

seenMessages.add(data.id);
addMessage(data);

}

function broadcast(data){
connections.forEach(c=>c.send(data));
}

</script>

</body>
</html>
