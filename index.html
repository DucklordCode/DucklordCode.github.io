<script>

let peer;
let connections=[];
let seenMessages=new Set();
let currentRoom=null;
let isConnected=false;
let userAvatar=null;

/* =========================
   PROFILE SYSTEM
========================= */

function saveProfile(){
localStorage.setItem("name",username.value);
localStorage.setItem("badge",badge.value);
localStorage.setItem("color",color.value);
localStorage.setItem("avatar",userAvatar||"");
}

function loadProfile(){
username.value=localStorage.getItem("name")||"";
badge.value=localStorage.getItem("badge")||"";
color.value=localStorage.getItem("color")||"#60a5fa";
userAvatar=localStorage.getItem("avatar")||null;
}

/* =========================
   ROOM STATUS
========================= */

function setConnected(state){
isConnected=state;
roomInfo.innerText=state
? "Connected to Room: "+currentRoom
: "Not Connected";
}

/* =========================
   SYSTEM MESSAGE
========================= */

function system(text){
const div=document.createElement("div");
div.className="system";
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* =========================
   ENTER KEY LOGIC
========================= */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

if(e.shiftKey) return;

if(document.activeElement!==message){
e.preventDefault();
message.focus();
return;
}

e.preventDefault();

if(message.value.trim()!=="" || file.files.length>0){
send();
}

}

});

/* =========================
   PASTE IMAGE SUPPORT
========================= */

document.addEventListener("paste",function(e){

const items=e.clipboardData.items;

for(let item of items){

if(item.type.startsWith("image")){

const blob=item.getAsFile();
const reader=new FileReader();

reader.onload=ev=>{

const data=createMessageObject();
data.file={
name:"pasted.png",
type:"image/png",
data:ev.target.result
};

addMessage(data);
broadcast(data);

};

reader.readAsDataURL(blob);

}

}

});

/* =========================
   IMAGE ZOOM
========================= */

function zoomImage(src){
zoomImg.src=src;
imageZoom.style.display="flex";
}

function closeZoom(){
imageZoom.style.display="none";
}

/* =========================
   ROOM SYSTEM (FIXED)
========================= */

function closePeer(){
if(peer)peer.destroy();
connections=[];
setConnected(false);
}

function createRoom(){

closePeer();

currentRoom=room.value||Math.random().toString(36).slice(2,8);
localStorage.setItem("room",currentRoom);

peer=new Peer(currentRoom);

peer.on("open",()=>{
setConnected(true);
system("Room Created");
});

peer.on("connection",conn=>{
connections.push(conn);

conn.on("open",()=>{
system("User Joined");
sendUserUpdate();
});

conn.on("data",handleData);

});

}

function joinRoom(){

closePeer();

currentRoom=room.value;
localStorage.setItem("room",currentRoom);

peer=new Peer();

peer.on("open",()=>{

const conn=peer.connect(currentRoom);
connections.push(conn);

conn.on("open",()=>{
setConnected(true);
system("Joined Room");
sendUserUpdate();
});

conn.on("data",handleData);

});

}

/* =========================
   USER SYNC
========================= */

function sendUserUpdate(){
broadcast({
type:"user",
name:username.value||"User",
id:peer.id
});
}

/* =========================
   MESSAGE CREATION
========================= */

function createMessageObject(){
return{
id:Date.now()+Math.random(),
type:"msg",
name:username.value||"User",
color:color.value,
badge:badge.value,
avatar:userAvatar,
msg:message.value.trim(),
time:Date.now()
};
}

/* =========================
   SEND MESSAGE / FILES
========================= */

function send(){

if(!isConnected){
alert("Not connected to a room.");
return;
}

saveProfile();

const text=message.value.trim();
const selectedFile=file.files[0];

if(!text && !selectedFile) return;

const data=createMessageObject();

if(selectedFile){

const reader=new FileReader();

reader.onload=e=>{
data.file={
name:selectedFile.name,
type:selectedFile.type,
data:e.target.result
};
finish();
};

reader.readAsDataURL(selectedFile);

}else{
finish();
}

function finish(){
addMessage(data);
broadcast(data);
seenMessages.add(data.id);
}

message.value="";
file.value="";
}

/* =========================
   RECEIVE DATA
========================= */

function handleData(data){

if(data.type==="msg"){

if(seenMessages.has(data.id)) return;

seenMessages.add(data.id);
addMessage(data);

}

if(data.type==="user"){
system(data.name+" Joined");
}

}

/* =========================
   BROADCAST
========================= */

function broadcast(data){
connections.forEach(c=>{
if(c.open)c.send(data);
});
}

/* =========================
   MESSAGE DISPLAY
========================= */

function addMessage(d){

const div=document.createElement("div");
div.className="msg";

let fileHTML="";

if(d.file){

if(d.file.type.startsWith("image")){
fileHTML=`<img src="${d.file.data}" style="max-width:200px;border-radius:6px;cursor:pointer" onclick="zoomImage('${d.file.data}')">`;
}else{
fileHTML=`<a href="${d.file.data}" download="${d.file.name}">Download ${d.file.name}</a>`;
}

}

const avatarHTML=d.avatar
? `<div class="avatar"><img src="${d.avatar}"></div>`
: `<div class="avatar">${d.name.charAt(0)}</div>`;

div.innerHTML=`
${avatarHTML}
<div>
<span class="name" style="color:${d.color}">${d.name}</span>
${d.badge?`<span class="badge">${d.badge}</span>`:""}
<span class="time">${new Date(d.time).toLocaleTimeString()}</span>
<div>${d.msg||""}</div>
${fileHTML}
</div>
`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* =========================
   AUTO RECONNECT
========================= */

function autoReconnect(){
loadProfile();
const saved=localStorage.getItem("room");
if(saved){
room.value=saved;
joinRoom();
}
}

autoReconnect();

</script>
