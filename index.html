<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhys Chat</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* Sidebar */

#sidebar{
width:260px;
background:#111827;
padding:15px;
border-right:1px solid #1f2937;
overflow:auto;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#1d4ed8;}

#main{
flex:1;
display:flex;
flex-direction:column;
min-width:0;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

/* Messages */

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
}

.name{font-weight:bold;}
.time{font-size:11px;opacity:.6;margin-left:6px;}

.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

.system{
opacity:.7;
font-style:italic;
margin:6px 0;
}

/* Input */

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input[type="text"]{
flex:1;
padding:8px;
border-radius:6px;
border:none;
color:white;
background:#1f2937;
}

/* room info */

#roomInfo{
padding:6px;
background:#1f2937;
font-size:14px;
}

/* user list */

#users{
margin-top:10px;
background:#1f2937;
padding:8px;
border-radius:6px;
font-size:13px;
}

/* image zoom */

#imageZoom{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#imageZoom img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<div id="imageZoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<div id="sidebar">

<h2>Bhys Chat</h2>

<h3>Room</h3>

<div id="roomInfo">Not in a room</div>

<input id="room" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<h3>Users</h3>
<div id="users"></div>

<h3>Profile</h3>

<input id="username" placeholder="Name">
<input type="color" id="color" value="#60a5fa">
<input id="badge" placeholder="Badge">
<input type="file" id="avatarUpload" accept="image/*">

</div>

<div id="main">

<div id="chat"></div>

<div id="inputbar">
<input id="message" type="text" placeholder="Message...">
<input type="file" id="file">
<button onclick="send()">Send</button>
</div>

</div>

<script>

/* STATE */

let peer;
let connections=[];
let users={};
let seenMessages=new Set();
let userAvatar=null;
let currentRoom=null;

/* SAVE PROFILE */

function saveProfile(){

localStorage.setItem("name",username.value);
localStorage.setItem("badge",badge.value);
localStorage.setItem("color",color.value);
localStorage.setItem("avatar",userAvatar);

}

function loadProfile(){

username.value=localStorage.getItem("name")||"";
badge.value=localStorage.getItem("badge")||"";
color.value=localStorage.getItem("color")||"#60a5fa";
userAvatar=localStorage.getItem("avatar");

}

/* ROOM DISPLAY */

function updateRoomInfo(){

roomInfo.innerText=currentRoom
? "Room: "+currentRoom
: "Not in a room";

}

/* USER LIST */

function updateUserList(){

users[peer.id]=username.value||"User";

usersDiv="";

for(let id in users){

usersDiv+=users[id]+"<br>";

}

users.innerHTML=usersDiv;

}

/* SYSTEM MESSAGE */

function system(text){

const div=document.createElement("div");
div.className="system";
div.innerText=text;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

}

/* AVATAR */

avatarUpload.addEventListener("change",()=>{

const file=avatarUpload.files[0];
if(!file)return;

const reader=new FileReader();

reader.onload=e=>{
userAvatar=e.target.result;
saveProfile();
};

reader.readAsDataURL(file);

});

/* FILE PASTE */

document.addEventListener("paste",e=>{

const items=e.clipboardData.items;

for(let item of items){

if(item.type.startsWith("image")){

const file=item.getAsFile();

fileInput=file;

sendFile(file);

}

}

});

/* IMAGE ZOOM */

function zoomImage(src){

zoomImg.src=src;
imageZoom.style.display="flex";

}

function closeZoom(){

imageZoom.style.display="none";

}

/* ROOM SYSTEM */

function closePeer(){

if(peer)peer.destroy();
connections=[];

}

function createRoom(){

closePeer();

currentRoom=room.value||Math.random().toString(36).slice(2,7);

peer=new Peer(currentRoom);

localStorage.setItem("room",currentRoom);

updateRoomInfo();

peer.on("open",()=>{

system("Room created");

updateUserList();

});

peer.on("connection",conn=>{

connections.push(conn);

conn.on("data",handleData);

conn.on("open",()=>{

conn.send({
type:"user",
name:username.value
});

});

});

}

function joinRoom(){

closePeer();

currentRoom=room.value;

localStorage.setItem("room",currentRoom);

peer=new Peer();

updateRoomInfo();

peer.on("open",()=>{

const conn=peer.connect(currentRoom);

connections.push(conn);

conn.on("data",handleData);

conn.on("open",()=>{

conn.send({
type:"user",
name:username.value
});

});

});

}

/* MESSAGE DISPLAY */

function addMessage(d){

const div=document.createElement("div");
div.className="msg";

const time=new Date(d.time).toLocaleTimeString();

let fileHTML="";

if(d.file){

if(d.file.type.startsWith("image")){

fileHTML=`<img src="${d.file.data}" style="max-width:200px;border-radius:6px;cursor:pointer" onclick="zoomImage('${d.file.data}')">`;

}else{

fileHTML=`<a href="${d.file.data}" download="${d.file.name}">Download ${d.file.name}</a>`;

}

}

const avatarHTML=d.avatar
? `<img src="${d.avatar}" class="avatar">`
: `<div class="avatar">${d.name.charAt(0)}</div>`;

div.innerHTML=`

${avatarHTML}

<div>
<span class="name" style="color:${d.color}">${d.name}</span>
${d.badge?`<span class="badge">${d.badge}</span>`:""}
<span class="time">${time}</span>

<div>${d.msg||""}</div>

${fileHTML}

</div>

`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

}

/* SEND */

function send(){

saveProfile();

const text=message.value.trim();

if(!text && !file.files[0])return;

const data={

id:Date.now()+Math.random(),
type:"msg",
name:username.value||"User",
color:color.value,
badge:badge.value,
avatar:userAvatar,
msg:text,
time:Date.now()

};

if(file.files[0]){

const reader=new FileReader();

reader.onload=e=>{

data.file={
name:file.files[0].name,
type:file.files[0].type,
data:e.target.result
};

finish();

};

reader.readAsDataURL(file.files[0]);

}else{

finish();

}

function finish(){

addMessage(data);
broadcast(data);
seenMessages.add(data.id);

}

message.value="";
file.value="";

}

/* HANDLE DATA */

function handleData(data){

if(data.type==="msg"){

if(seenMessages.has(data.id))return;

seenMessages.add(data.id);

addMessage(data);

}

if(data.type==="user"){

users[data.id]=data.name;

updateUserList();

}

}

/* BROADCAST */

function broadcast(data){

connections.forEach(c=>c.send(data));

}

/* AUTO RECONNECT */

function autoReconnect(){

loadProfile();

const savedRoom=localStorage.getItem("room");

if(savedRoom){

room.value=savedRoom;
joinRoom();

}

}

autoReconnect();

</script>

</body>
</html>
