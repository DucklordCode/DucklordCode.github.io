```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhys Chat</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:#111827;
padding:15px;
border-right:1px solid #1f2937;
overflow:auto;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#1d4ed8}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.name{font-weight:bold}

.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

.system{
opacity:.7;
font-style:italic;
margin:6px 0;
}

/* INPUT */

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input[type="text"]{
flex:1;
padding:8px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

/* ADMIN PANEL */

#adminPanel{
display:none;
background:#1f2937;
padding:10px;
margin-top:10px;
border-radius:8px;
}

/* GOOBER WINDOW */

#gooberWindow{

position:absolute;
top:120px;
left:300px;

width:180px;
height:auto;

background:#111827;
border:1px solid #1f2937;
border-radius:8px;

resize:both;
overflow:auto;

z-index:1000;

}

#gooberHeader{

background:#1f2937;
padding:5px;
cursor:move;

display:flex;
justify-content:space-between;
align-items:center;

}

#gooberBody{
padding:6px;
text-align:center;
font-size:12px;
}

#goober{

width:50px;
height:50px;
background:#374151;
border-radius:6px;

display:flex;
align-items:center;
justify-content:center;

margin:auto;

font-size:20px;

cursor:pointer;
transition:transform .1s;

}

#goober.pop{
transform:scale(1.25)
}

#gooberWindow button{
width:100%;
margin-top:4px;
font-size:11px;
}

.rainbowGoober{
animation:hue 3s linear infinite
}

@keyframes hue{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

/* BRODY SCREEN */

#brodyScreen{
position:fixed;
inset:0;
background:#0078d7;
color:white;
font-family:"Lucida Console","Courier New",monospace;
padding:30px;
display:none;
z-index:9999;
overflow:hidden;
}

</style>
</head>

<body>

<div id="brodyScreen"></div>

<div id="sidebar">

<h2>Bhys Chat</h2>

<h3>Room</h3>
<input id="room" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<h3>Profile</h3>
<input id="username" placeholder="Name">
<input type="color" id="color" value="#60a5fa">
<input id="badge" placeholder="Badge">
<input type="file" id="avatarUpload">

<button onclick="applyGooberBadge()">Use Goober Badge</button>

<div id="adminPanel">

<h3>Dev Panel</h3>

<button onclick="clearChat()">Clear Chat</button>
<button onclick="spamSystem()">Spam Event</button>

<h4>Goober Hacks</h4>

<button onclick="hackGoobers(1000)">+1,000 Goobers</button>
<button onclick="hackGoobers(10000)">+10,000 Goobers</button>
<button onclick="maxGoober()">Max Upgrades</button>
<button onclick="forceRebirth()">Instant Rebirth</button>
<button onclick="resetGoober()">Reset Goobers</button>

</div>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputbar">
<input id="message" type="text" placeholder="Message...">
<input type="file" id="image">
<button onclick="send()">Send</button>
</div>

</div>

<!-- GOOBER WINDOW -->

<div id="gooberWindow">

<div id="gooberHeader">
Goober Clicker
<button onclick="toggleGoober()">–</button>
</div>

<div id="gooberBody">

<div id="goober">:)</div>

<div id="gooberCount">0</div>

<button onclick="upgradeClick()">
+Click (<span id="priceClick"></span>)
</button>

<button onclick="upgradeAuto()">
Auto (<span id="priceAuto"></span>)
</button>

<button onclick="upgradeRainbow()">
Rainbow (<span id="priceRainbow"></span>)
</button>

<button onclick="rebirth()" id="rebirthBtn">
Rebirth (100000)
</button>

<div id="rebirthCount"></div>

</div>

</div>

<script>

/* ENTER KEY LOGIC */

document.addEventListener("keydown",e=>{

if(e.key==="Enter"){

if(document.activeElement!==message){
message.focus()
return
}

if(message.value.trim()!==""){
send()
}

}

})

/* CHAT */

let peer
let connections=[]
let seenMessages=new Set()

function system(text){

let div=document.createElement("div")
div.className="system"
div.innerText=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

/* ROOMS */

function closePeer(){
if(peer) peer.destroy()
connections=[]
}

function createRoom(){

closePeer()

let roomName=room.value || Math.random().toString(36).substring(2,8)
room.value=roomName

peer=new Peer(roomName)

peer.on("open",()=>{
system("Room created: "+roomName)
})

peer.on("connection",conn=>{

connections.push(conn)

system("A user joined the room")

conn.on("data",handleData)

conn.on("close",()=>{
system("A user left the room")
})

})

}

function joinRoom(){

if(!room.value) return

closePeer()

peer=new Peer()

peer.on("open",()=>{

let conn=peer.connect(room.value)

connections.push(conn)

system("Joined room: "+room.value)

conn.on("data",handleData)

conn.on("close",()=>{
system("Disconnected from room")
})

})

}

/* GOOBER SYSTEM */

let goobers=0
let perClick=1
let auto=0
let rainbow=false
let rebirths=0

let priceClick=10
let priceAuto=25
let priceRainbow=50

function updateGooberUI(){

gooberCount.innerText=goobers+" goobers"

priceClick.innerText=priceClick
priceAuto.innerText=priceAuto
priceRainbow.innerText=priceRainbow

rebirthCount.innerText="Rebirths: "+rebirths

rebirthBtn.disabled=goobers<100000

}

goober.onclick=()=>{

goobers+=perClick

goober.classList.add("pop")

setTimeout(()=>goober.classList.remove("pop"),100)

updateGooberUI()
saveGoober()

}

function upgradeClick(){

if(goobers<priceClick) return

goobers-=priceClick
perClick++

priceClick=Math.floor(priceClick*1.5)

updateGooberUI()
saveGoober()

}

function upgradeAuto(){

if(goobers<priceAuto) return

goobers-=priceAuto
auto++

priceAuto=Math.floor(priceAuto*1.6)

updateGooberUI()
saveGoober()

}

function upgradeRainbow(){

if(goobers<priceRainbow) return

goobers-=priceRainbow
rainbow=true

goober.classList.add("rainbowGoober")

updateGooberUI()
saveGoober()

}

function rebirth(){

if(goobers<100000) return

rebirths++

goobers=0
perClick=1
auto=0
rainbow=false

priceClick=10
priceAuto=25
priceRainbow=50

goober.classList.remove("rainbowGoober")

updateGooberUI()
saveGoober()

}

setInterval(()=>{

if(auto>0){

goobers+=auto

updateGooberUI()
saveGoober()

}

},1000)

/* SAVE */

function saveGoober(){

localStorage.setItem("gooberSave",JSON.stringify({
goobers,perClick,auto,rainbow,rebirths,
priceClick,priceAuto,priceRainbow
}))

}

function loadGoober(){

let save=JSON.parse(localStorage.getItem("gooberSave"))
if(!save) return
Object.assign(window,save)

}

loadGoober()
updateGooberUI()

/* GOOBER WINDOW DRAG */

let widget=document.getElementById("gooberWindow")
let header=document.getElementById("gooberHeader")

let offsetX=0
let offsetY=0
let dragging=false

header.onmousedown=e=>{

dragging=true

offsetX=e.clientX-widget.offsetLeft
offsetY=e.clientY-widget.offsetTop

}

document.onmousemove=e=>{

if(!dragging) return

widget.style.left=e.clientX-offsetX+"px"
widget.style.top=e.clientY-offsetY+"px"

}

document.onmouseup=()=>{

dragging=false

localStorage.setItem("gooberPos",JSON.stringify({
x:widget.style.left,
y:widget.style.top
}))

}

let pos=JSON.parse(localStorage.getItem("gooberPos"))

if(pos){

widget.style.left=pos.x
widget.style.top=pos.y

}

/* COLLAPSE */

function toggleGoober(){

if(gooberBody.style.display==="none"){
gooberBody.style.display="block"
}else{
gooberBody.style.display="none"
}

}

</script>
</html>
