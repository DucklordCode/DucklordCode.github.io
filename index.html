<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bhys Chat</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:#111827;
padding:15px;
border-right:1px solid #1f2937;
overflow:auto;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

#typingIndicator{
font-size:12px;
opacity:.6;
padding:4px 10px;
}

/* MESSAGE */

.msg{
display:flex;
gap:10px;
margin-bottom:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.badge{
background:#374151;
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:6px;
}

/* INPUT BAR */

#inputbar{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #1f2937;
background:#111827;
}

#inputbar input{
flex:1;
padding:8px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

/* SETTINGS */

#settingsBtn{
position:absolute;
top:10px;
right:10px;
z-index:1000;
}

#settingsPanel{
position:fixed;
top:60px;
right:20px;
background:#111827;
padding:15px;
border-radius:8px;
display:none;
z-index:1000;
}

/* THEMES */

.theme-light{background:#f4f4f4;color:black;}
.theme-green{background:#022c22;}
.theme-purple{background:#1e1b4b;}

/* FRUTIGER AERO */

.theme-aero{
background:
radial-gradient(circle at 20% 20%, #a7f3d0, transparent 40%),
radial-gradient(circle at 80% 30%, #7dd3fc, transparent 40%),
linear-gradient(#b3e5fc,#38bdf8);
color:#003344;
font-family:Verdana;
}

/* glass panels */

.theme-aero #sidebar{
background:rgba(255,255,255,0.35);
backdrop-filter:blur(12px);
}

.theme-aero #chat{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
}

/* bubbles */

.bubble{
position:fixed;
bottom:-100px;
width:30px;
height:30px;
background:rgba(255,255,255,.4);
border-radius:50%;
animation:bubbleFloat 15s linear infinite;
pointer-events:none;
}

@keyframes bubbleFloat{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* globe */

.globe{
position:fixed;
bottom:20px;
right:20px;
width:120px;
height:120px;
border-radius:50%;
background:
radial-gradient(circle at 30% 30%, #a7f3d0, #38bdf8);
opacity:.4;
animation:spin 30s linear infinite;
pointer-events:none;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* SIN */

#sinOverlay{
position:fixed;
inset:0;
pointer-events:none;
display:none;
z-index:9000;
}

.crack{
position:absolute;
height:4px;
background:#ff00aa;
box-shadow:0 0 15px #ff00aa;
animation:crackSpread 1.2s forwards;
}

@keyframes crackSpread{
0%{width:0}
100%{width:100vw}
}

.sinPopup{
position:fixed;
background:black;
color:#ff00aa;
border:2px solid #ff00aa;
padding:10px;
font-family:Courier New;
animation:fallError 2s linear forwards;
}

@keyframes fallError{
0%{transform:translateY(-200px)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<button id="settingsBtn" onclick="toggleSettings()">⚙</button>

<div id="settingsPanel">

<h3>Theme</h3>

<select onchange="setTheme(this.value)">
<option value="">Default</option>
<option value="theme-light">Light</option>
<option value="theme-green">Green</option>
<option value="theme-purple">Purple</option>
<option value="theme-aero">Frutiger Aero</option>
</select>

</div>

<div id="sinOverlay"></div>

<div id="sidebar">

<h2>Bhys Chat</h2>

<input id="room" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<div id="roomInfo">Not connected</div>

<h3>Profile</h3>

<input id="username" placeholder="Name">
<input type="color" id="color" value="#60a5fa">
<input type="file" id="avatarUpload">

</div>

<div id="main">

<div id="chat"></div>

<div id="typingIndicator"></div>

<div id="inputbar">
<input id="message" placeholder="Message">
<input type="file" id="file">
<button onclick="send()">Send</button>
</div>

</div>

<script>

/* GLOBAL */

let peer
let connections=[]
let isHost=false
let userAvatar=null
let seen=new Set()

/* SETTINGS */

function toggleSettings(){
settingsPanel.style.display=
settingsPanel.style.display==="block"?"none":"block"
}

function setTheme(t){

document.body.classList.remove(
"theme-light","theme-green","theme-purple","theme-aero"
)

removeAeroEffects()

if(t){

document.body.classList.add(t)

if(t==="theme-aero") enableAero()

}

}

/* AERO EFFECTS */

function enableAero(){

spawnBubbles()

let globe=document.createElement("div")
globe.className="globe"
globe.id="aeroGlobe"

document.body.appendChild(globe)

}

function removeAeroEffects(){

document.querySelectorAll(".bubble").forEach(b=>b.remove())

let g=document.getElementById("aeroGlobe")
if(g) g.remove()

}

function spawnBubbles(){

for(let i=0;i<12;i++){

let b=document.createElement("div")
b.className="bubble"

b.style.left=Math.random()*100+"vw"
b.style.animationDuration=10+Math.random()*10+"s"

document.body.appendChild(b)

}

}

/* NETWORK */

function closePeer(){

if(peer)peer.destroy()

connections=[]

}

function createRoom(){

closePeer()

isHost=true

peer=new Peer(room.value)

peer.on("open",id=>{

roomInfo.innerText="Room: "+id+" (Host)"

})

peer.on("connection",conn=>{

connections.push(conn)

system("User joined")

conn.on("data",data=>{

handleData(data)

connections.forEach(c=>{
if(c!==conn)c.send(data)
})

})

conn.on("close",()=>{

system("User left")

connections=connections.filter(c=>c!==conn)

})

})

}

function joinRoom(){

closePeer()

isHost=false

peer=new Peer()

peer.on("open",()=>{

let conn=peer.connect(room.value)

connections=[conn]

roomInfo.innerText="Room: "+room.value

conn.on("data",handleData)

})

}

/* AVATAR UPLOAD */

avatarUpload.onchange=()=>{

let f=avatarUpload.files[0]

if(!f) return

let r=new FileReader()

r.onload=e=>{
userAvatar=e.target.result
}

r.readAsDataURL(f)

}

/* MESSAGE */

function addMessage(d){

let div=document.createElement("div")
div.className="msg"

let avatar=d.avatar
? `<div class="avatar"><img src="${d.avatar}"></div>`
: `<div class="avatar">${d.name[0]}</div>`

let fileHTML=""

if(d.file){

if(d.fileType.startsWith("image/")){

fileHTML=`<img src="${d.file}" style="max-width:200px;border-radius:6px;">`

}else{

fileHTML=`<a href="${d.file}" download="${d.fileName}">Download ${d.fileName}</a>`

}

}

div.innerHTML=`

${avatar}

<div>
<span style="color:${d.color}">${d.name}</span>
<div>${d.msg||""}</div>
${fileHTML}
</div>

`

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function broadcast(data){

connections.forEach(c=>c.send(data))

}

function send(){

let msg=message.value.trim()
let f=file.files[0]

if(!msg && !f) return

if(msg.toLowerCase()==="/summon sin"){

triggerSin()
broadcast({type:"sin"})
return

}

let data={
id:Date.now()+Math.random(),
type:"msg",
name:username.value||"User",
color:color.value,
avatar:userAvatar,
msg:msg
}

if(f){

let r=new FileReader()

r.onload=e=>{

data.file=e.target.result
data.fileType=f.type
data.fileName=f.name

finish()

}

r.readAsDataURL(f)

}else{

finish()

}

function finish(){

addMessage(data)
broadcast(data)

}

message.value=""
file.value=""

}

/* RECEIVE */

function handleData(d){

if(d.type==="sin"){triggerSin();return}

if(seen.has(d.id))return
seen.add(d.id)

addMessage(d)

}

/* SYSTEM */

function system(t){

let d=document.createElement("div")
d.style.opacity=.6
d.innerText=t

chat.appendChild(d)

}

/* SIN EVENT */

function triggerSin(){

sinOverlay.style.display="block"
sinOverlay.innerHTML=""

for(let i=0;i<20;i++){

let c=document.createElement("div")
c.className="crack"
c.style.top=Math.random()*window.innerHeight+"px"

sinOverlay.appendChild(c)

}

setTimeout(()=>{

for(let i=0;i<25;i++){

let p=document.createElement("div")
p.className="sinPopup"

p.innerText="STRAYAWAYFROMWHATSRIGHT"

p.style.left=Math.random()*window.innerWidth+"px"

document.body.appendChild(p)

setTimeout(()=>p.remove(),2000)

}

},1200)

setTimeout(()=>{

sinOverlay.style.display="none"
closePeer()
system("Sin shattered the room.")

},4500)

}

/* ENTER SEND */

document.addEventListener("keydown",e=>{

if(e.key==="Enter"){

if(document.activeElement!==message){
message.focus()
return
}

send()

}

})

</script>

</body>
</html>
